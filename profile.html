<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenseflix - Profile</title>
    <link rel="stylesheet" href="assets/css/profile-styles.css">
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="home-btn" title="Home">🏠</a>
                <h1 class="logo"><a href="index.html" style="text-decoration:none;color:inherit;">🎬 TENSEFLIX</a></h1>
                <div class="header-buttons">
                    <a href="dashboard.html" class="back-link">← Dashboard</a>
                    <button class="logout-btn" onclick="logout()">Log Out</button>
                </div>
            </div>
        </div>
    </div>

    <div class="profile-container">
        <div class="container">
            <!-- View Mode Section -->
            <div id="view-mode">
                <div class="profile-header">
                    <div class="user-avatar-section">
                        <div class="user-avatar" id="user-avatar">👤</div>
                        <div class="avatar-image-container" id="avatar-image-container" style="display: none;">
                            <img id="profile-photo" src="" alt="Profile Photo" class="avatar-image">
                        </div>
                    </div>
                    <div class="profile-info">
                        <h2 id="username">User</h2>
                        <p class="user-subtitle">English Learner</p>
                        <div class="profile-details">
                            <p id="user-age" style="display: none;"><strong>Age:</strong> <span id="age-value">-</span></p>
                        </div>
                        <button class="btn-edit-profile" onclick="enterEditMode()">✏️ Edit Profile</button>
                    </div>
                </div>

                <!-- Statistics Overview -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">📚</div>
                        <div class="stat-value" id="tenses-learned">0</div>
                        <div class="stat-label">Tenses Learned</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">✅</div>
                        <div class="stat-value" id="exercises-completed">0</div>
                        <div class="stat-label">Exercises Done</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🎯</div>
                        <div class="stat-value" id="accuracy">0%</div>
                        <div class="stat-label">Accuracy</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🔥</div>
                        <div class="stat-value" id="streak">0</div>
                        <div class="stat-label">Day Streak</div>
                    </div>
                </div>

                <!-- Progress by Tense -->
                <div class="progress-section">
                    <h3>📊 Progress by Tense</h3>
                    <div class="tense-progress-list" id="tense-progress-list">
                        <!-- Progress bars will be loaded here -->
                    </div>
                </div>

                <!-- Actions -->
                <div class="actions-section">
                    <h3>⚙️ Account Actions</h3>
                    <div class="action-buttons">
                        <button class="btn-danger" onclick="confirmResetProgress()">
                            🗑️ Delete All Progress
                        </button>
                    </div>
                </div>
            </div>

            <!-- Edit Mode Section -->
            <div id="edit-mode" style="display: none;">
                <div class="edit-section">
                    <h3>✏️ Edit Profile</h3>
                    
                    <!-- Edit Tabs -->
                    <div class="edit-tabs">
                        <button class="edit-tab active" onclick="switchEditTab('basic')">👤 Basic Info</button>
                        <button class="edit-tab" onclick="switchEditTab('password')">🔐 Password</button>
                    </div>

                    <!-- Basic Edit Tab -->
                    <div id="tab-basic" class="edit-tab-content active">
                        <div class="edit-form">
                            <!-- Photo section -->
                            <div class="form-section">
                                <h4>Profile Photo</h4>
                                <div class="photo-edit-section">
                                    <div class="user-avatar-section">
                                        <div class="user-avatar" id="edit-user-avatar">👤</div>
                                        <div class="avatar-image-container" id="edit-avatar-image-container" style="display: none;">
                                            <img id="edit-profile-photo" src="" alt="Profile Photo" class="avatar-image">
                                        </div>
                                    </div>
                                    <div class="photo-controls">
                                        <button class="avatar-btn" onclick="document.getElementById('photo-input-edit').click()" title="Upload Photo">
                                            📷 Upload Photo
                                        </button>
                                        <button class="avatar-btn btn-danger" onclick="deleteProfilePhotoEdit()" id="delete-photo-btn-edit" style="display: none;" title="Remove photo">
                                            🗑️ Remove
                                        </button>
                                        <input type="file" id="photo-input-edit" accept="image/*" style="display: none;" onchange="handlePhotoUploadEdit(event)">
                                    </div>
                                </div>
                            </div>

                            <!-- Name and Age -->
                            <div class="form-section">
                                <h4>Personal Info</h4>
                                <div class="form-group">
                                    <label for="edit-name">Full Name:</label>
                                    <input type="text" id="edit-name" placeholder="Enter your name">
                                </div>
                                <div class="form-group">
                                    <label for="edit-age">Age:</label>
                                    <input type="number" id="edit-age" placeholder="Enter your age" min="1" max="100">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Password Edit Tab -->
                    <div id="tab-password" class="edit-tab-content">
                        <div class="edit-form">
                            <div class="form-section">
                                <h4>Change Password</h4>
                                <div class="form-group">
                                    <label for="current-password">Current Password:</label>
                                    <input type="password" id="current-password" placeholder="Enter current password">
                                </div>
                                <div class="form-group">
                                    <label for="new-password">New Password:</label>
                                    <input type="password" id="new-password" placeholder="New password (at least 6 characters)">
                                </div>
                                <div class="form-group">
                                    <label for="confirm-password">Confirm Password:</label>
                                    <input type="password" id="confirm-password" placeholder="Confirm new password">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="edit-buttons">
                        <button class="btn-save" onclick="saveProfileChanges()">💾 Save Changes</button>
                        <button class="btn-cancel" onclick="cancelProfileEdit()">❌ Cancel</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2026 TENSEFLIX - Master English Tenses</p>
    </div>

    <script src="assets/js/i18n.js"></script>
    <script src="assets/js/profiles.js"></script>
    <script src="assets/js/profile-script.js"></script>
</body>
</html>
