<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenseflix - Login</title>
    <link rel="stylesheet" href="auth-styles.css">
    <style>
        .auth-card {
            max-width: 360px; /* Уменьшаем размер карточки */
            width: 100%;
            margin: 0 auto;
            padding: 25px 30px; /* Уменьшаем внутренние отступы для компактности */
        }
        /* auth-container уже настроен на центрирование и min-height: 90vh */
        /* Складываем элементы выбора пола в колонку */
        .gender-group {
            display: flex;
            flex-direction: row; /* Размещаем элементы в одну линию */
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo-link" style="text-decoration:none;">
                    <h1 class="logo">🎬 TENSEFLIX</h1>
                </a>
                <p class="tagline">Master English Tenses Through Movies</p>
            </div>

            <!-- Login Form -->
            <div class="form-container" id="login-form">
                <h2>Sign In</h2>
                <form>
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <input 
                            type="text" 
                            id="login-username" 
                            placeholder="Enter your username" 
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input 
                            type="password" 
                            id="login-password" 
                            placeholder="••••••••" 
                            required
                        >
                    </div>
                    <button type="submit" class="btn btn-primary" style="margin-top: 15px;">Sign In</button>
                </form>
                <p class="form-switch">
                    Don't have an account? 
                    <a href="#" onclick="switchForm(event)">Register</a>
                </p>
            </div>

            <!-- Register Form -->
            <div class="form-container active" id="register-form">
                <h2>Register</h2>
                <form>
                    <div class="form-group">
                        <label for="register-username">Username</label>
                        <input 
                            type="text" 
                            id="register-username" 
                            placeholder="At least 3 characters" 
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="register-dob">Date of Birth</label>
                        <input 
                            type="date" 
                            id="register-dob" 
                            required
                        >
                    </div>
                    <div class="form-group gender-group" style="margin-bottom: 15px;">
                        <label style="margin:0; font-weight:600;">Gender:</label>
                        <label style="display:flex; align-items:center; gap:8px; cursor:pointer;"><input type="radio" name="register-gender" id="gender-male" value="Male" style="width:18px; height:18px;"> Male</label>
                        <label style="display:flex; align-items:center; gap:8px; cursor:pointer;"><input type="radio" name="register-gender" id="gender-female" value="Female" style="width:18px; height:18px;"> Female</label>
                    </div>
                    <div class="form-group">
                        <label for="register-password">Password</label>
                        <input 
                            type="password" 
                            id="register-password" 
                            placeholder="At least 6 characters" 
                            required
                            minlength="6"
                        >
                    </div>
                    <div class="form-group">
                        <label for="register-confirm">Confirm Password</label>
                        <input 
                            type="password" 
                            id="register-confirm" 
                            placeholder="••••••••" 
                            required
                        >
                    </div>
                    <button type="submit" class="btn btn-primary" style="margin-top: 15px;">Register</button>
                </form>
                <p class="form-switch" style="font-size:0.9rem;margin-top:12px;">
                    Already have an account? 
                    <a href="#" onclick="switchForm(event)">Sign In</a>
                </p>
            </div>

            <!-- Message -->
            <div class="message" id="message"></div>
        </div>

        <!-- Background decoration -->
        <div class="background-decoration">
            <div class="decoration-item">🎬</div>
            <div class="decoration-item">📚</div>
            <div class="decoration-item">🎓</div>
            <div class="decoration-item">🎯</div>
            <div class="decoration-item">✨</div>
        </div>

        <!-- Footer Links -->
        <div class="auth-footer">
            <a href="index.html">← Back to Home</a>
        </div>
    </div>

    <script src="profiles.js"></script>
    <script src="auth-script.js"></script>
</body>
</html>
