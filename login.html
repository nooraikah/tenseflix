<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenseflix - Login</title>
    <link rel="stylesheet" href="auth-styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo-link" style="text-decoration:none;">
                    <h1 class="logo">🎬 TENSEFLIX</h1>
                </a>
                <p class="tagline">Master English Tenses Through Movies</p>
            </div>

            <!-- Login Form -->
            <div class="form-container active" id="login-form">
                <h2>Sign In</h2>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <input 
                            type="text" 
                            id="login-username" 
                            placeholder="Enter your username" 
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input 
                            type="password" 
                            id="login-password" 
                            placeholder="••••••••" 
                            required
                        >
                    </div>
                    <button type="submit" class="btn btn-primary">Sign In</button>
                </form>
                <p class="form-switch">
                    Don't have an account? 
                    <a href="#" onclick="switchForm(event)">Register</a>
                </p>
            </div>

            <!-- Register Form -->
            <div class="form-container" id="register-form">
                <h2>Register</h2>
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="register-username">Username</label>
                        <input 
                            type="text" 
                            id="register-username" 
                            placeholder="At least 3 characters" 
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="register-name">Full Name</label>
                        <input 
                            type="text" 
                            id="register-name" 
                            placeholder="Your full name" 
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="register-password">Password</label>
                        <input 
                            type="password" 
                            id="register-password" 
                            placeholder="At least 6 characters" 
                            required
                            minlength="6"
                        >
                    </div>
                    <div class="form-group">
                        <label for="register-confirm">Confirm Password</label>
                        <input 
                            type="password" 
                            id="register-confirm" 
                            placeholder="••••••••" 
                            required
                        >
                    </div>
                    <div class="terms">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">I agree to the terms of use</label>
                    </div>
                    <button type="submit" class="btn btn-primary">Register</button>
                </form>
                <p class="form-switch">
                    Already have an account? 
                    <a href="#" onclick="switchForm(event)">Sign In</a>
                </p>
            </div>
                    <button type="submit" class="btn btn-primary">Register</button>
                </form>
                <p class="form-switch">
                    Already have an account? 
                    <a href="#" onclick="switchForm(event)">Sign In</a>
                </p>
            </div>

            <!-- Message -->
            <div class="message" id="message"></div>
        </div>

        <!-- Background decoration -->
        <div class="background-decoration">
            <div class="decoration-item">🎬</div>
            <div class="decoration-item">📚</div>
            <div class="decoration-item">🎓</div>
            <div class="decoration-item">🎯</div>
            <div class="decoration-item">✨</div>
        </div>

        <!-- Footer Links -->
        <div class="auth-footer">
            <a href="index.html">← Back to Home</a>
        </div>
    </div>

    <script src="profiles.js"></script>
    <script src="auth-script.js"></script>
</body>
</html>
