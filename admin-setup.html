<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Setup - Tenseflix</title>
    <link rel="stylesheet" href="auth-styles.css">
    <style>
        .admin-setup-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .setup-form {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .setup-form h2 {
            color: #333;
            margin-top: 0;
            text-align: center;
        }

        .setup-form p {
            color: #666;
            font-size: 14px;
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 500;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .message {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            text-align: center;
            font-weight: 500;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .admin-info {
            background: #e7f3ff;
            border: 1px solid #b3d9ff;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #004085;
        }

        .admin-info strong {
            display: block;
            margin-bottom: 5px;
        }

        .credentials-display {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            margin-top: 20px;
            display: none;
        }

        .credentials-display.show {
            display: block;
        }

        .credentials-display h3 {
            margin-top: 0;
            color: #333;
        }

        .credentials-display p {
            margin: 8px 0;
            text-align: left;
            font-family: monospace;
            color: #666;
        }

        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 10px;
        }

        .copy-btn:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="admin-setup-container">
        <div class="setup-form">
            <h2>🔐 Создание Администратора</h2>
            
            <div class="admin-info">
                <strong>⚠️ Важно!</strong>
                На этой странице можно создать учетную запись администратора с полным доступом ко всем урокам, заданиям и видео.
            </div>

            <div id="setup-message"></div>

            <form id="admin-setup-form">
                <div class="form-group">
                    <label for="admin-username">Логин администратора:</label>
                    <input type="text" id="admin-username" placeholder="например: admin" required>
                </div>

                <div class="form-group">
                    <label for="admin-password">Пароль:</label>
                    <input type="password" id="admin-password" placeholder="минимум 6 символов" required>
                </div>

                <div class="form-group">
                    <label for="admin-confirm">Подтвердить пароль:</label>
                    <input type="password" id="admin-confirm" placeholder="повторите пароль" required>
                </div>

                <div class="form-group">
                    <label for="admin-name">Полное имя:</label>
                    <input type="text" id="admin-name" placeholder="например: Администратор" required>
                </div>

                <button type="submit" class="btn">Создать Администратора</button>
            </form>

            <div id="credentials-display" class="credentials-display">
                <h3>✅ Администратор создан успешно!</h3>
                <p><strong>Логин:</strong> <span id="display-username"></span></p>
                <p><strong>Пароль:</strong> <span id="display-password"></span></p>
                <p><strong>Имя:</strong> <span id="display-name"></span></p>
                <p style="color: #888; font-size: 12px; margin-top: 10px;">Сохраните эти учетные данные в безопасном месте.</p>
                <button type="button" class="copy-btn" onclick="copyCredentials()">Скопировать</button>
                <button type="button" class="btn" style="margin-top: 15px;" onclick="goToLogin()">Перейти на вход</button>
            </div>
        </div>
    </div>

    <script src="profiles.js"></script>
    <script>
        function showMessage(text, type = 'info') {
            const messageEl = document.getElementById('setup-message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
        }

        function clearMessage() {
            const messageEl = document.getElementById('setup-message');
            messageEl.textContent = '';
            messageEl.className = 'message';
        }

        document.getElementById('admin-setup-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('admin-username').value.trim();
            const password = document.getElementById('admin-password').value;
            const confirm = document.getElementById('admin-confirm').value;
            const fullName = document.getElementById('admin-name').value.trim();

            // Validation
            if (!username || !password || !fullName) {
                showMessage('Пожалуйста, заполните все поля', 'error');
                return;
            }

            if (password !== confirm) {
                showMessage('Пароли не совпадают', 'error');
                return;
            }

            // Create admin account
            const result = profileManager.createAdminAccount(username, password, fullName);

            if (!result.success) {
                showMessage(result.message, 'error');
                return;
            }

            // Show success and credentials
            showMessage('Администратор успешно создан!', 'success');
            
            // Display credentials
            document.getElementById('display-username').textContent = username;
            document.getElementById('display-password').textContent = password;
            document.getElementById('display-name').textContent = fullName;
            document.getElementById('credentials-display').classList.add('show');

            // Hide form
            document.getElementById('admin-setup-form').style.display = 'none';
        });

        function copyCredentials() {
            const username = document.getElementById('display-username').textContent;
            const password = document.getElementById('display-password').textContent;
            const name = document.getElementById('display-name').textContent;
            
            const text = `Учетные данные администратора Tenseflix:\nЛогин: ${username}\nПароль: ${password}\nИмя: ${name}`;
            
            navigator.clipboard.writeText(text).then(() => {
                alert('Учетные данные скопированы в буфер обмена');
            });
        }

        function goToLogin() {
            window.location.href = 'login.html';
        }

        // Show warning if admin already exists
        window.addEventListener('load', function() {
            const profiles = profileManager.getAllProfiles();
            const hasAdmin = Object.values(profiles).some(p => p.role === 'admin');
            
            if (hasAdmin) {
                showMessage('⚠️ Администратор уже существует в системе', 'warning');
            }
        });
    </script>
</body>
</html>
