<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инициализация Админа - Tenseflix</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 500px;
        }
        
        h1 {
            color: #333;
            text-align: center;
        }
        
        .credentials {
            background: #f5f5f5;
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            font-family: monospace;
        }
        
        .credentials p {
            margin: 10px 0;
            font-size: 16px;
        }
        
        .credentials strong {
            color: #667eea;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        
        .btn-init {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-init:hover {
            opacity: 0.9;
        }
        
        .btn-login {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
        }
        
        .btn-login:hover {
            background: #e0e0e0;
        }
        
        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        #status {
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Инициализация Администратора</h1>
        
        <div id="status"></div>
        
        <div class="credentials">
            <p><strong>Логин:</strong> admin</p>
            <p><strong>Пароль:</strong> admin123</p>
            <p><strong>Имя:</strong> Администратор</p>
            <p style="font-size: 12px; color: #888; margin-top: 15px;">⚠️ Пожалуйста, смените пароль после первого входа!</p>
        </div>
        
        <div class="button-group">
            <button class="btn-init" onclick="initializeAdmin()">Создать администратора</button>
            <button class="btn-login" onclick="goToLogin()">Перейти на вход</button>
        </div>
    </div>

    <script src="assets/js/profiles.js"></script>
    <script>
        function showStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `message ${type}`;
        }

        function initializeAdmin() {
            const profiles = profileManager.getAllProfiles();
            
            // Check if admin already exists
            if (profiles['admin']) {
                showStatus('✅ Администратор уже существует! Логин: admin, Пароль: admin123', 'warning');
                return;
            }
            
            // Create admin account
            const result = profileManager.createAdminAccount('admin', 'admin123', 'Администратор');
            
            if (result.success) {
                showStatus('✅ Администратор успешно создан! Логин: admin, Пароль: admin123', 'success');
                setTimeout(() => {
                    goToLogin();
                }, 2000);
            } else {
                showStatus('❌ Ошибка: ' + result.message, 'error');
            }
        }

        function goToLogin() {
            window.location.href = 'login.html';
        }

        // Check on page load if admin exists
        window.addEventListener('load', function() {
            const profiles = profileManager.getAllProfiles();
            const adminExists = profiles['admin'] !== undefined;
            
            if (adminExists && profiles['admin'].role === 'admin') {
                showStatus('✅ Администраторская учетная запись уже существует!', 'success');
            }
        });
    </script>
</body>
</html>
